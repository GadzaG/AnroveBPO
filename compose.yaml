services:
  anrovebpo.web:
    container_name: anrove_bpo_api
    build:
      context: .
      dockerfile: AnroveBPO.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "3001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  postgres:
    container_name: anrove_bpo_postgres
    image: postgres
    environment:
      POSTGRES_DB: anrove_bpo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "3000:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
volumes:
  postgres-data: